<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatih Tercüman | Full Stack Solution Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #0984e3;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1e3799 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .profile-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            /* Ağacı kesip seni merkeze alır */
            object-position: center 25%; 
            border: 4px solid var(--primary);
            box-shadow: 0 0 50px rgba(9, 132, 227, 0.3);
            transition: 0.6s;
        }

        .fullstack-tag {
            background: var(--primary);
            padding: 6px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            transition: 0.4s;
            height: 100%;
        }

        .section-title {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .social-link {
            width: 55px; height: 55px;
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--glass);
            border-radius: 50%;
            color: white;
            font-size: 1.4rem;
            margin: 0 12px;
            transition: 0.3s;
            text-decoration: none;
            border: 1px solid var(--glass-border);
        }

        .social-link:hover {
            background: var(--primary);
            transform: translateY(-8px);
            color: white;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3);
        }

        .project-icon { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <header class="hero">
        <div class="container" data-aos="zoom-out">
            <div class="mb-4">
                <img src="profil.jpg.jpeg" alt="Fatih Tercüman" class="profile-img">
            </div>
            <span class="fullstack-tag">Full Stack Developer</span>
            <h1 class="display-3 fw-bold mt-3">Fatih Tercüman</h1>
            <p class="lead opacity-75">Solution Developer | .NET Specialist</p>
            <div class="mt-4">
                <a href="#projects" class="btn btn-primary btn-lg rounded-pill px-5">View My Projects</a>
            </div>
        </div>
    </header>

    <section id="projects" class="py-5">
        <div class="container">
            <h2 class="section-title text-center" data-aos="fade-up">Portfolio Projects</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="glass-card text-center">
                        <i class="fas fa-layer-group project-icon"></i>
                        <h4>E-Commerce Backend</h4>
                        <p class="opacity-75">Scalable .NET Core architecture.</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card text-center">
                        <i class="fas fa-database project-icon"></i>
                        <h4>SQL Analytics</h4>
                        <p class="opacity-75">Complex data visualization.</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card text-center">
                        <i class="fas fa-code project-icon"></i>
                        <h4>Custom CMS</h4>
                        <p class="opacity-75">Full Stack management system.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 text-center">
        <div class="container" data-aos="zoom-in">
            <h2 class="section-title">Let's Connect</h2>
            <div class="d-flex justify-content-center mb-5">
                <a href="https://www.linkedin.com/search/results/people/?origin=SEO_PSERP&firstName=%22Fatih%22&lastName=%22Terc%C3%BCman%22" target="_blank" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://x.com/fatihtercumann" target="_blank" class="social-link"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="mailto:fatihtercuman5353@gmail.com" class="social-link"><i class="fas fa-envelope"></i></a>
            </div>
            <h4 class="fw-light">fatihtercuman5353@gmail.com</h4>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>AOS.init({ duration: 1200, once: true });</script>
</body>
</html>
